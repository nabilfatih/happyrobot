app = "acme-logistics-fde"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_PATH = "/data/acme-logistics.sqlite"
  HOST = "0.0.0.0"
  PORT = "3000"

[[mounts]]
  source = "acme_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
